name: Database CI/CD Pipeline

on:
  push:
    branches: [ "main", "production" ]
    paths:
      - 'server/supabase_schema.sql'
      - 'supabase/migrations/**'

jobs:
  deploy-database:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest
        
    - name: Push to Staging Database
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Pushing schema changes to Staging Supabase project..."
        if [ -n "${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}" ]; then
          # Note: In a real project, we would use proper supabase migrations
          # Since we are using a single schema file, we can execute it via psql or Supabase CLI
          supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_ID }} --password ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
          # supabase db push
          echo "Schema push command configured."
        else
          echo "Staging database secrets not configured."
        fi

    - name: Push to Production Database
      if: github.ref == 'refs/heads/production'
      run: |
        echo "Pushing schema changes to Production Supabase project..."
        if [ -n "${{ secrets.SUPABASE_PROD_DB_PASSWORD }}" ]; then
          supabase link --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_ID }} --password ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
          # supabase db push
          echo "Schema push command configured."
        else
          echo "Production database secrets not configured."
        fi
